<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>初一食午成本分析 Dashboard</title>
  <style>
    :root {
      --ink:#17211c; --muted:#66736d; --line:#d9e1dc; --paper:#fbfcf8; --panel:#fff;
      --green:#2f7d5a; --gold:#c17a2c; --red:#b24b51; --blue:#3b78a3; --soft:#f1f6f1;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--paper);color:var(--ink);font-family:"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;line-height:1.5}
    header{padding:30px clamp(16px,4vw,48px) 18px;background:#f3f7f1;border-bottom:1px solid var(--line)}
    h1{margin:0;font-size:clamp(24px,3vw,38px);letter-spacing:0}
    .sub{margin-top:8px;color:var(--muted)}
    main{padding:20px clamp(14px,3vw,42px) 42px}
    .toolbar{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}
    label{display:grid;gap:6px;font-size:13px;color:var(--muted)}
    select{min-height:40px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:8px 10px;font-size:15px;color:var(--ink)}
    .kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}
    .card,.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:0 8px 24px rgba(23,33,28,.06)}
    .card{padding:16px;min-height:112px}.card span{display:block;color:var(--muted);font-size:13px}.card strong{display:block;margin-top:8px;font-size:clamp(22px,3vw,31px)}.card em{display:block;margin-top:5px;font-style:normal;color:var(--muted);font-size:13px}
    .grid{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(330px,.9fr);gap:16px;align-items:start}
    .small-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;margin-top:16px}
    .panel{padding:16px}.panel-title{display:flex;justify-content:space-between;gap:10px;align-items:baseline;margin-bottom:10px}h2{margin:0;font-size:18px}.hint{font-size:13px;color:var(--muted)}
    svg{display:block;width:100%;height:auto}.axis{stroke:var(--line)}.label{font-size:11px;fill:var(--muted)}
    .legend{display:flex;flex-wrap:wrap;gap:10px;font-size:13px;color:var(--muted)}.sw{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px}
    .donut-wrap{display:grid;grid-template-columns:minmax(170px,.9fr) minmax(180px,1fr);gap:14px;align-items:center}.donut-legend{display:grid;gap:8px}.donut-row{display:grid;grid-template-columns:12px 1fr auto;gap:8px;align-items:center;font-size:13px}.donut-row b{font-weight:600}.donut-row span:last-child{color:var(--muted)}
    .item-list{display:grid;gap:10px}.item-row{display:grid;gap:6px;padding:10px 0;border-bottom:1px solid var(--line)}.item-meta{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:baseline}.item-name{font-weight:700}.item-sub{color:var(--muted);font-size:13px}.item-bar{height:10px;border-radius:999px;background:#eef3ee;overflow:hidden}.item-fill{height:100%;border-radius:999px;background:#8b6f47}.item-value{font-weight:700;white-space:nowrap}
    .analysis-list{display:grid;gap:10px}.analysis-card{padding:11px 12px;border-left:4px solid var(--blue);background:#f7faf6;border-radius:6px}.analysis-card b{display:block;margin-bottom:4px}.analysis-card span{color:var(--muted);font-size:13px}
    table{width:100%;border-collapse:collapse;font-size:14px}th,td{padding:9px 8px;border-bottom:1px solid var(--line);text-align:right;vertical-align:top}th:first-child,td:first-child{text-align:left}th{color:var(--muted);font-weight:600;background:#f7faf6}
    .reports{display:grid;gap:10px;max-height:520px;overflow:auto;padding-right:4px}.report{border-left:4px solid var(--green);background:#f7faf6;padding:10px 12px;border-radius:6px}.report.warn{border-left-color:var(--gold)}.report.bad{border-left-color:var(--red)}.report b{display:block;margin-bottom:4px}
    .notes{margin-top:16px;color:var(--muted);font-size:13px}
    @media(max-width:980px){.toolbar,.kpis,.grid,.small-grid,.donut-wrap{grid-template-columns:1fr}th,td{font-size:13px;padding:8px 6px}.item-meta{grid-template-columns:1fr}.item-value{white-space:normal}.donut-wrap svg{max-width:280px;margin:auto}}
  </style>
</head>
<body>
  <header>
    <h1>初一食午成本分析 Dashboard</h1>
    <div class="sub">主軸：<span id="range"></span>。以每月收入對照食材、雜貨、飲品、固定、人事與雜支成本，找出成本壓力月份與主要成本來源。更新時間：<span id="generatedAt"></span></div>
  </header>
  <main>
    <section class="toolbar">
      <label>年度<select id="yearFilter"></select></label>
      <label>月份<select id="monthFilter"></select></label>
      <label>成本狀態<select id="statusFilter"></select></label>
      <label>排序<select id="sortMode"><option value="period">依月份</option><option value="costRatioDesc">成本率高到低</option><option value="costDesc">成本高到低</option><option value="netDesc">淨收入高到低</option></select></label>
    </section>
    <section class="kpis">
      <div class="card"><span>分析月份</span><strong id="kpiMonths"></strong><em>2025 至 2026/04</em></div>
      <div class="card"><span>總收入</span><strong id="kpiRevenue"></strong><em>期間累計</em></div>
      <div class="card"><span>平均成本率</span><strong id="kpiCostRatio"></strong><em>總成本 / 總收入</em></div>
      <div class="card"><span>成本率最高</span><strong id="kpiHighest"></strong><em id="kpiHighestNote"></em></div>
    </section>
    <section class="grid">
      <div class="panel">
        <div class="panel-title"><h2>每月收入與成本堆疊</h2><div id="legend" class="legend"></div></div>
        <div id="stackChart"></div>
      </div>
      <div class="panel">
        <div class="panel-title"><h2>成本群組累計</h2><span class="hint">期間成本結構</span></div>
        <div id="groupChart"></div>
      </div>
    </section>
    <section class="small-grid">
      <div class="panel">
        <div class="panel-title"><h2>成本率與淨收入率</h2><span class="hint">越靠上成本壓力越高</span></div>
        <div id="ratioChart"></div>
      </div>
      <div class="panel">
        <div class="panel-title"><h2>成本明細排行</h2><span class="hint">依期間累計金額</span></div>
        <div id="itemChart"></div>
      </div>
    </section>
    <section class="small-grid">
      <div class="panel">
        <div class="panel-title"><h2>收入明細排行</h2><span class="hint">依期間累計金額</span></div>
        <div id="revenueItemChart"></div>
      </div>
      <div class="panel">
        <div class="panel-title"><h2>收入類別分析</h2><span class="hint">占比、月均、最高月份與趨勢</span></div>
        <div id="revenueAnalysisList"></div>
      </div>
    </section>
    <section class="grid" style="margin-top:16px">
      <div class="panel">
        <div class="panel-title"><h2>月份成本明細</h2><span class="hint">收入、總成本、成本率與最大成本</span></div>
        <div id="detailTable"></div>
      </div>
      <div class="panel">
        <div class="panel-title"><h2>每月成本分析報告</h2><span class="hint">自動判讀成本壓力</span></div>
        <div id="reports" class="reports"></div>
      </div>
    </section>
    <div id="notes" class="notes"></div>
  </main>

  <script>
    const data=JSON.parse(document.getElementById('cost-data').textContent);
    const fmtMoney=v=>Math.round(v||0).toLocaleString('zh-TW');
    const fmtPct=v=>v==null?'-':(v*100).toFixed(1)+'%';
    const years=[...new Set(data.monthly.map(d=>d.year))];
    const monthNames=['全部月份','1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    const months=[...new Set(data.monthly.map(d=>d.month))].sort((a,b)=>a-b);
    const statuses=['全部狀態',...new Set(data.monthly.map(d=>d.status))];
    yearFilter.innerHTML=['全部年度',...years].map(y=>`<option value="${y}">${y}</option>`).join('');
    monthFilter.innerHTML=['全部月份',...months].map(m=>`<option value="${m}">${typeof m==='number'?monthNames[m]:m}</option>`).join('');
    statusFilter.innerHTML=statuses.map(s=>`<option value="${s}">${s}</option>`).join('');
    range.textContent=data.range; generatedAt.textContent=data.generatedAt;
    kpiMonths.textContent=data.summary.months+' 個'; kpiRevenue.textContent=fmtMoney(data.summary.revenue)+' 元';
    kpiCostRatio.textContent=fmtPct(data.summary.costRatio); kpiHighest.textContent=data.summary.highestCostPeriod; kpiHighestNote.textContent=fmtPct(data.summary.highestCostRatio);
    legend.innerHTML=data.groups.map(g=>`<span><i class="sw" style="background:${data.colors[g]}"></i>${g}</span>`).join('');
    notes.innerHTML=data.notes.map(n=>'資料註記：'+n).join('<br>');
    function rows(){let r=data.monthly.filter(d=>(yearFilter.value==='全部年度'||String(d.year)===yearFilter.value)&&(monthFilter.value==='全部月份'||String(d.month)===monthFilter.value)&&(statusFilter.value==='全部狀態'||d.status===statusFilter.value)); const s=sortMode.value; if(s==='costRatioDesc')r=r.slice().sort((a,b)=>b.costRatio-a.costRatio); if(s==='costDesc')r=r.slice().sort((a,b)=>b.cost-a.cost); if(s==='netDesc')r=r.slice().sort((a,b)=>b.net-a.net); return r}
    function svg(w,h,x){return `<svg viewBox="0 0 ${w} ${h}" role="img">${x}</svg>`}
    function empty(){return `<div class="hint" style="padding:20px 0">目前篩選沒有資料</div>`}
    function aggregateGroups(r){return data.groups.map(group=>({group,amount:r.reduce((sum,d)=>sum+(d.groups[group]||0),0)}))}
    function aggregateCostItems(r){const totals={}; r.forEach(d=>Object.entries(d.items).forEach(([k,v])=>totals[k]=(totals[k]||0)+v)); return Object.entries(totals).map(([item,amount])=>({item,amount})).filter(d=>d.amount>0).sort((a,b)=>b.amount-a.amount).slice(0,15)}
    function aggregateRevenueItems(r){const totals={}; r.forEach(d=>Object.entries(d.revenueItems).forEach(([k,v])=>totals[k]=(totals[k]||0)+v)); const total=r.reduce((sum,d)=>sum+d.revenue,0); return Object.entries(totals).map(([item,amount])=>({item,amount,share:total?amount/total:0})).filter(d=>d.amount>0).sort((a,b)=>b.amount-a.amount)}
    function drawStack(r){if(!r.length)return empty(); r=r.slice().sort((a,b)=>a.period.localeCompare(b.period)); const w=980,h=390,p={l:58,r:18,t:18,b:48}; const max=Math.max(...r.map(d=>Math.max(d.revenue,d.cost)))*1.08; const bw=(w-p.l-p.r)/r.length*.62; const step=(w-p.l-p.r)/r.length; const y=v=>h-p.b-v/max*(h-p.t-p.b); let out=[0,.25,.5,.75,1].map(t=>{const yy=p.t+t*(h-p.t-p.b);return `<line class="axis" x1="${p.l}" x2="${w-p.r}" y1="${yy}" y2="${yy}"/><text class="label" x="8" y="${yy+4}">${Math.round(max*(1-t)/1000)}k</text>`}).join(''); r.forEach((d,i)=>{let base=0; const x=p.l+i*step+bw*.28; data.groups.forEach(g=>{const v=d.groups[g]||0; const yy=y(base+v), hh=y(base)-yy; out+=`<rect x="${x}" y="${yy}" width="${bw}" height="${Math.max(hh,1)}" fill="${data.colors[g]}" rx="2"><title>${d.period} ${g}: ${fmtMoney(v)}</title></rect>`; base+=v}); out+=`<circle cx="${x+bw/2}" cy="${y(d.revenue)}" r="4" fill="#17211c"><title>${d.period} 收入: ${fmtMoney(d.revenue)}</title></circle><text class="label" x="${x+bw/2}" y="${h-18}" text-anchor="middle">${d.period.slice(2)}</text>`}); return svg(w,h,out)}
    function drawGroup(filtered){const r=aggregateGroups(filtered); const total=r.reduce((sum,d)=>sum+d.amount,0); if(!total)return empty(); const radius=78, stroke=34, cx=120, cy=112, circ=2*Math.PI*radius; let offset=0; const arcs=r.map(d=>{const share=d.amount/total; const dash=share*circ; const el=`<circle cx="${cx}" cy="${cy}" r="${radius}" fill="none" stroke="${data.colors[d.group]}" stroke-width="${stroke}" stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})"><title>${d.group}: ${fmtPct(share)}｜${fmtMoney(d.amount)} 元</title></circle>`; offset+=dash; return el}).join(''); const donut=svg(240,224,`<circle cx="${cx}" cy="${cy}" r="${radius}" fill="none" stroke="#edf2ee" stroke-width="${stroke}"/>${arcs}<text x="${cx}" y="${cy-6}" text-anchor="middle" style="font-size:18px;font-weight:700;fill:#17211c">總成本</text><text x="${cx}" y="${cy+20}" text-anchor="middle" class="label">${fmtMoney(total)} 元</text>`); const rows=r.map(d=>{const share=d.amount/total; return `<div class="donut-row"><i class="sw" style="background:${data.colors[d.group]}"></i><b>${d.group}</b><span>${fmtPct(share)}｜${fmtMoney(d.amount)}</span></div>`}).join(''); return `<div class="donut-wrap">${donut}<div class="donut-legend">${rows}</div></div>`}
    function drawRatio(r){r=r.filter(d=>d.revenue>0).sort((a,b)=>a.period.localeCompare(b.period)); if(!r.length)return empty(); const w=760,h=300,p={l:48,r:16,t:18,b:44}; const y=v=>h-p.b-v/.95*(h-p.t-p.b); const step=(w-p.l-p.r)/Math.max(r.length-1,1); const x=i=>p.l+i*step; const line=key=>r.map((d,i)=>`${x(i)},${y(d[key])}`).join(' '); let out=[.6,.75,.9].map(v=>`<line class="axis" x1="${p.l}" x2="${w-p.r}" y1="${y(v)}" y2="${y(v)}"/><text class="label" x="8" y="${y(v)+4}">${Math.round(v*100)}%</text>`).join(''); out+=`<polyline fill="none" stroke="#b24b51" stroke-width="3" points="${line('costRatio')}"/><polyline fill="none" stroke="#2f7d5a" stroke-width="3" points="${line('netRatio')}"/>`; out+=r.map((d,i)=>`<circle cx="${x(i)}" cy="${y(d.costRatio)}" r="3.5" fill="#b24b51"><title>${d.period} 成本率 ${fmtPct(d.costRatio)}</title></circle><circle cx="${x(i)}" cy="${y(d.netRatio)}" r="3.5" fill="#2f7d5a"><title>${d.period} 淨收入率 ${fmtPct(d.netRatio)}</title></circle>${i%2===0?`<text class="label" x="${x(i)}" y="${h-18}" text-anchor="middle">${d.period.slice(2)}</text>`:''}`).join(''); return svg(w,h,out)}
    function drawItems(filtered){const r=aggregateCostItems(filtered); const total=filtered.reduce((sum,d)=>sum+d.cost,0); if(!r.length||!total)return empty(); const max=Math.max(...r.map(d=>d.amount)); return `<div class="item-list">${r.map((d,i)=>{const parts=d.item.split('｜'); const group=parts[0], name=parts[1]||d.item; const pct=d.amount/total; const width=Math.max(4,d.amount/max*100); return `<div class="item-row"><div class="item-meta"><div><div class="item-name">${i+1}. ${name}</div><div class="item-sub">${group}｜占總成本 ${fmtPct(pct)}</div></div><div class="item-value">${fmtMoney(d.amount)} 元</div></div><div class="item-bar"><div class="item-fill" style="width:${width}%;background:${data.colors[group]||'#8b6f47'}"></div></div></div>`}).join('')}</div>`}
    function drawRevenueItems(filtered){const r=aggregateRevenueItems(filtered); if(!r.length)return empty(); const max=Math.max(...r.map(d=>d.amount)); return `<div class="item-list">${r.map((d,i)=>{const width=Math.max(4,d.amount/max*100); return `<div class="item-row"><div class="item-meta"><div><div class="item-name">${i+1}. ${d.item}</div><div class="item-sub">占總收入 ${fmtPct(d.share)}</div></div><div class="item-value">${fmtMoney(d.amount)} 元</div></div><div class="item-bar"><div class="item-fill" style="width:${width}%;background:#3b78a3"></div></div></div>`}).join('')}</div>`}
    function revenueAnalysis(filtered){const r=aggregateRevenueItems(filtered); if(!r.length){revenueAnalysisList.innerHTML=empty();return} const months=Math.max(new Set(filtered.map(d=>d.period)).size,1); revenueAnalysisList.innerHTML=`<div class="analysis-list">${r.map(d=>{const monthValues=filtered.map(row=>({period:row.period,amount:row.revenueItems[d.item]||0})); const peak=monthValues.reduce((a,b)=>b.amount>a.amount?b:a,monthValues[0]); const avg=d.amount/months; const role=d.share>=.42?'核心收入來源':d.share>=.18?'主要輔助收入':d.share>=.06?'穩定補充收入':'小額收入來源'; return `<div class="analysis-card"><b>${d.item}｜${role}</b><span>${d.item} 在目前篩選範圍累計 ${fmtMoney(d.amount)} 元，占收入 ${fmtPct(d.share)}，月均 ${fmtMoney(avg)} 元；最高月份為 ${peak.period} 的 ${fmtMoney(peak.amount)} 元。</span></div>`}).join('')}</div>`}
    function table(r){detailTable.innerHTML=`<table><thead><tr><th>月份</th><th>收入</th><th>總成本</th><th>成本率</th><th>淨收入</th><th>最大成本</th><th>狀態</th></tr></thead><tbody>${r.map(d=>`<tr><td>${d.period}</td><td>${fmtMoney(d.revenue)}</td><td>${fmtMoney(d.cost)}</td><td>${fmtPct(d.costRatio)}</td><td>${fmtMoney(d.net)}</td><td>${d.largestGroup}</td><td>${d.status}</td></tr>`).join('')}</tbody></table>`}
    function report(r){reports.innerHTML=r.map(d=>{const cls=d.status.includes('高')||d.status.includes('偏低')?'bad':d.status.includes('留意')||d.status.includes('快於')?'warn':''; return `<div class="report ${cls}"><b>${d.period}｜${d.status}</b>${d.analysis}</div>`}).join('')}
    function render(){const r=rows(); stackChart.innerHTML=drawStack(r); groupChart.innerHTML=drawGroup(r); ratioChart.innerHTML=drawRatio(r); itemChart.innerHTML=drawItems(r); revenueItemChart.innerHTML=drawRevenueItems(r); revenueAnalysis(r); table(r); report(r)}
    yearFilter.addEventListener('change',render); monthFilter.addEventListener('change',render); statusFilter.addEventListener('change',render); sortMode.addEventListener('change',render); render();
  </script>
</body>
</html>
